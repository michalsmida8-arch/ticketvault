name: Build and Release
on:
  workflow_dispatch:
    push:
        tags:
              - 'v*'
              jobs:
                build:
                    runs-on: windows-latest
                        steps:
                              - uses: actions/checkout@v4
                                    - uses: actions/setup-node@v4
                                            with:
                                                      node-version: 20
                                                            - name: Install deps
                                                                    run: npm install
                                                                          - name: Release
                                                                                  env:
                                                                                            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                                                                                                    run: npm run release
