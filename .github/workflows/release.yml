# Build & Release — triggers on tag push (v*.*.*) or manual dispatch.
# Builds Windows (installer + portable) on Windows runner and macOS (arm64
# DMG + ZIP) on macOS runner, in parallel. electron-builder uploads artifacts
# to the matching GitHub Release automatically via GH_TOKEN.
name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      # Don't cancel other builds if one fails — users can still get the other platform.
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            build_cmd: build:win
          - os: macos-latest
            platform: mac
            build_cmd: build:mac-arm

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.platform }}
        run: npm run ${{ matrix.build_cmd }}
        env:
          # electron-builder uploads to the matching tag's GitHub Release.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip macOS code-signing (no Developer ID) — users will need to
          # right-click → Open the first time, or run `xattr -cr`.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts as workflow artifact (fallback)
        # Even if the Release upload fails (e.g. release missing), artifacts
        # are still available from the Actions run for a week.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TicketVault-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn
          retention-days: 14
