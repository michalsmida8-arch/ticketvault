# Auto-build TicketVault Windows installer on every tag push (v1.0.1, v1.2.0, ...).
# On tag push, GitHub Actions spins up a Windows runner, builds the installer,
# and publishes the artifact to the GitHub Release created from the tag.
# Users' installed apps then detect the new release via electron-updater and
# auto-download in the background.
#
# TO CREATE A NEW RELEASE:
#   1. Bump version in package.json (e.g. 1.0.0 → 1.0.1)
#   2. git commit -am "release 1.0.1"
#   3. git tag v1.0.1
#   4. git push && git push --tags
#   5. GitHub Actions will build & publish automatically (~5 min)
#
# Mac builds are handled manually (user rebuilds locally when needed) since
# code-signing on macOS requires an Apple Developer certificate ($99/year).

name: Build & Release

on:
  push:
    tags:
      - 'v*'    # Any tag starting with "v" triggers a build
  workflow_dispatch:  # Also allow manual trigger from GitHub UI

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write   # Required so the runner can upload to the GitHub Release

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build & publish Windows installer
        env:
          # electron-builder needs this token to upload artifacts to the Release.
          # GITHUB_TOKEN is auto-provided by Actions — no manual secret setup needed.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
