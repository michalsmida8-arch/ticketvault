# Build & Release — triggers on tag push (v*.*.*) or manual dispatch.
#
# Strategy:
# 1. create-release job runs FIRST and ensures the GitHub Release exists.
#    This avoids the race condition where two parallel build jobs both try
#    to create the release for the same tag (one wins, the other retries
#    5× and fails).
# 2. build job (matrix: win + mac) runs in parallel AFTER the release exists.
#    Both upload their artifacts into the pre-created release.
# 3. Mac build is allowed to "succeed with warnings" — electron-builder has
#    a long-standing bug where hdiutil cleanup fails on GitHub Actions even
#    though the DMG was already uploaded. We treat that exit code as cosmetic.
name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Create the GitHub Release first so both parallel builds can upload to it
  # without racing each other. softprops/action-gh-release is idempotent:
  # if the release already exists for this tag, it just no-ops.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create or find release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            build_cmd: build:win
          - os: macos-latest
            platform: mac
            build_cmd: build:mac

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Build script invokes electron-builder with --publish always, which
      # uploads artifacts to the GitHub Release that create-release made above.
      # Without --publish, electron-builder only builds locally and leaves
      # the Release empty (which is what bit us in 1.6.5).
      # Mac build is "continue-on-error" because electron-builder sometimes
      # exits 1 during DMG cleanup (hdiutil detach) even after artifacts
      # are successfully built and uploaded. Win build is strict.
      - name: Build ${{ matrix.platform }}
        id: build
        continue-on-error: ${{ matrix.platform == 'mac' }}
        run: npm run ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip macOS code-signing (we don't have a Developer ID).
          # Users right-click→Open the first time, or run `xattr -cr`.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Always upload artifacts as workflow artifact too (fallback if release
      # upload didn't happen, e.g. token issue).
      - name: Upload artifacts (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TicketVault-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn
          retention-days: 14

      # Belt-and-suspenders: if electron-builder's --publish flag silently
      # didn't upload (auth quirk, race condition with create-release, etc.),
      # we explicitly upload the dist/ artifacts to the release here. This
      # action is idempotent and won't replace files that already exist.
      - name: Upload to GitHub Release (fallback)
        if: always() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.blockmap
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
